version: "3.9"
services:
  backend:
    build:
      context: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    volumes:
      - backend_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/broking_ai.db

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes: ["./frontend:/app"]
    command: sh -c "npm install && npm run dev -- --host"
    ports: ["5173:5173"]
    depends_on: [backend]

volumes:
  backend_data:
