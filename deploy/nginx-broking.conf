# nginx site for the platform: serves the built React SPA and reverse-proxies
# /api to the uvicorn backend on 127.0.0.1:8000.
#
# This is the HTTP (port 80) block. Run certbot afterwards:
#   sudo certbot --nginx -d dev-invest.niytri.com
# certbot edits this file in place to add the 443/TLS server block, the
# certificate paths, and an automatic HTTP→HTTPS redirect.
#
# Install to:
#   Amazon Linux: /etc/nginx/conf.d/broking.conf
#   Ubuntu:       /etc/nginx/sites-available/broking.conf  (+ symlink to sites-enabled)
server {
    listen 80;
    server_name dev-invest.niytri.com;

    # Built frontend (copied here by the setup script)
    root /var/www/broking-ai;
    index index.html;

    # Allow broker-research document uploads (RAG)
    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # long agentic pipeline / LLM calls
        proxy_send_timeout 600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
