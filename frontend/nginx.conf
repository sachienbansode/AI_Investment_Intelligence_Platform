# Serves the built React SPA and reverse-proxies API calls to the backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Larger bodies for broker-research document uploads (RAG).
    client_max_body_size 25m;

    # API → backend container (Docker network DNS name "backend").
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # long agentic pipeline / LLM calls
        proxy_send_timeout 600s;
    }

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
